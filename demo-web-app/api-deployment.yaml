apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  selector:
    matchLabels:
      app: admin-api
  replicas: 2
  template:
    metadata:
      labels:
        app: admin-api
    spec:
      containers:
        - name: admin-api
          image: admin-api:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 3001
        - name: postgres-db
          image: postgres:16-bookworm
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: root
            - name: POSTGRES_DB
              value: admindb
