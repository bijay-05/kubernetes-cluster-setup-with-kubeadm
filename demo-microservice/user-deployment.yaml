apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
spec:
  selector:
    matchLabels:
      app: user
  replicas: 2
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: docker.io/bijaydockerhub/user-ms:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
