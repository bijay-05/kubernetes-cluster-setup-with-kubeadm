apiVersion: apps/v1
kind: Deployment
metadata:
  name: apig-deployment
spec:
  selector:
    matchLabels:
      app: apig
  replicas: 2
  template:
    metadata:
      labels:
        app: apig
    spec:
      containers:
        - name: apig
          image: docker.io/bijaydockerhub/apig-ms:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
